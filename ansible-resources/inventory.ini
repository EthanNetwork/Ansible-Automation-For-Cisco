[access_switches]
switch1 ansible_host=172.16.1.1
switch2 ansible_host=172.16.1.2

[core_switches]
coresw00 ansible_host=172.16.1.3

[asbr_routers]
router00 ansible_host=172.16.1.4
router01 ansible_host=172.16.1.5

[all:vars]
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=cisco.ios.ios
ansible_user=userchangeme
ansible_password=passwordchangeme
ansible_become=yes
ansible_become_method=enable
ansible_become_password=passwordchangeme
