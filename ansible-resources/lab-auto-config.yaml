---
- name: Pre-deployment health check
  hosts: asbr_routers
  connection: network_cli
  gather_facts: false

  tasks:
    - name: Check if router is reachable
      cisco.ios.ios_ping:
        dest: "{{ ansible_host }}"
        count: 3
      register: ping_result

    - name: Show interface status
      cisco.ios.ios_command:
        commands:
          - "show ip interface brief"
      register: interface_status

    - name: Display pre-check results
      debug:
        var: interface_status.stdout_lines

- name: Configure Cisco ASBR routers via CLI commands
  hosts: asbr_routers
  connection: network_cli
  gather_facts: false

  tasks:
    - name: Backup current running config
      cisco.ios.ios_command:
        commands:
          - "show running-config"
      register: backup

    - name: Save backup to local file
      copy:
        content: "{{ backup.stdout[0] }}"
        dest: "./backups/{{ inventory_hostname }}-{{ ansible_date_time.date }}.cfg"
      delegate_to: localhost

    - name: Set hostname and basic configs
      cisco.ios.ios_config:
        commands:
          - "hostname {{ hostname }}"
          - "interface loopback0"
          - "exit"
          - "router ospf 1"
          - "auto-cost reference-bandwidth 100000"
          - "area 0 authentication message-digest"
          - "passive-interface GigabitEthernet0/0/2"
          - "default-information originate"

    - name: Configure access-lists
      cisco.ios.ios_config:
        commands:
          - "ip access-list 10 permit {{ pat_ip_netaddr }} {{ pat_ip_wildcard }}"

    - name: Configure routed interface GigabitEthernet0/0/0
      cisco.ios.ios_config:
        parents: "interface GigabitEthernet0/0/0"
        commands:
          - "ip address {{ g000_ip }}"
          - "standby 10 ip {{ hsrp_ip1 }}"
          - "standby version 2"
          - "standby 10 priority {{ g000_hsrp_priority }}"
          - "ip ospf priority {{ g000_ospf_priority }}"
          - "ip ospf message-digest-key 1 md5 {{ ospf_password }}"
          - "ip ospf 1 area 0"
          - "ip nat inside"

    - name: Configure interface GigabitEthernet0/0/1
      cisco.ios.ios_config:
        parents: "interface GigabitEthernet0/0/1"
        commands:
          - "ip address {{ g001_ip }}"
          - "standby 20 ip {{ hsrp_ip2 }}"
          - "standby version 2"
          - "standby 20 priority {{ g001_hsrp_priority }}"
          - "ip ospf priority {{ g001_ospf_priority }}"
          - "ip ospf message-digest-key 1 md5 {{ ospf_password }}"
          - "ip ospf 1 area 0"
          - "ip nat inside"

    - name: Configure loopback0
      cisco.ios.ios_config:
        parents: "interface loopback0"
        commands:
          - "ip address {{ loopback_ip }}"
          - "ip ospf message-digest-key 1 md5 {{ ospf_password }}"
          - "ip ospf 1 area 0"

    - name: Configure interface GigabitEthernet0/0/2 (DHCP WAN)
      cisco.ios.ios_config:
        parents: "interface GigabitEthernet0/0/2"
        commands:
          - "ip address dhcp"
          - "ip ospf message-digest-key 1 md5 {{ ospf_password }}"
          - "ip ospf 1 area 0"
          - "ip nat outside"

    - name: Configure NAT and global settings
      cisco.ios.ios_config:
        commands:
          - "ip nat inside source list 10 interface GigabitEthernet0/0/2 overload"
          - "ntp server 1.1.1.1"
          - "ip name-server 1.1.1.1"
          - "ntp source loopback0"

    - name: Save running config to startup
      cisco.ios.ios_command:
        commands:
          - "write memory"